<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMN - Registro de Asistencia</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- PANTALLA 1 -->
    <section id="pantallaInicio" class="pantalla activa">
        <div class="card">
            <h1>Registro de Asistencia</h1>

            <div class="info-evento">
                <p><strong>Evento:</strong> Reunión General</p>
                <p><strong>Estado:</strong> <span id="estadoEvento">Activo</span></p>
                <p><strong>Hora inicio:</strong> 08:00</p>
                <p><strong>Tolerancia:</strong> 10 minutos</p>
            </div>

            <button id="btnRegistrar">
                Registrar asistencia
            </button>
        </div>
    </section>

    <!-- PANTALLA 2 -->
    <section id="pantallaFormulario" class="pantalla">
        <div class="card">

            <button class="volver" id="volverInicio">
                ← Volver
            </button>

            <h2>Registro de asistencia</h2>

            <form id="formAsistencia">

                <label>Nombre participante</label>
                <input
                    type="text"
                    id="nombre"
                    placeholder="Ingrese nombre"
                    required
                >

                <label>Hora de llegada</label>
                <input
                    type="time"
                    id="hora"
                    required
                >

                <button type="submit">
                    Confirmar registro
                </button>

            </form>

            <div class="mensaje" id="mensajeError"></div>

        </div>
    </section>

    <!-- PANTALLA 3 -->
    <section id="pantallaResultado" class="pantalla">
        <div class="card">

            <h2>Resultado del registro</h2>

            <div class="resultado-box">
                <p><strong>Participante:</strong> <span id="resultadoNombre"></span></p>
                <p><strong>Hora registrada:</strong> <span id="resultadoHora"></span></p>
                <p><strong>Estado final:</strong> <span id="resultadoEstado"></span></p>
            </div>

            <div id="bloqueJustificacion" class="oculto">

                <h3>Ingresar justificación</h3>

                <textarea
                    id="textoJustificacion"
                    placeholder="Ingrese motivo..."
                ></textarea>

                <button id="btnJustificar">
                    Enviar justificación
                </button>

                <div class="mensaje" id="mensajeJustificacion"></div>

            </div>

            <button id="volverMenu">
                Volver al inicio
            </button>

        </div>
    </section>

    <script src="js/app.js"></script>

</body>
</html>
